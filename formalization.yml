  scope: >
    Formalizes the Parity Obstruction (Parity Budget) for sieve majorants
    on finite rings Fin(P·m). It establishes an abstract framework proving 
    that any majorant suppressing a bounded witness must incur excess mass
    and inflated L² energy. Applies this framework to the finite parity witness
    χ(x) = μ(gcd(x, P)). Unconditionally proves that parity-separating weights
    cost more than the Möbius baseline (Result A). Conditionally proves the 
    obstruction for arbitrary density functions (Result B). Includes concrete
    validations for P=6.
